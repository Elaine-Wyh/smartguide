<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>交通标志识别导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:14px 16px;text-align:center}
.header h1{font-size:1.2em}
#st{font-size:0.7em;margin-top:4px;opacity:0.85}
.container{max-width:700px;margin:0 auto;padding:10px}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card h3{font-size:0.95em;margin-bottom:8px;color:#1a1a2e}
.upload-zone{border:2px dashed #d9d9d9;border-radius:10px;min-height:140px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
.upload-zone img{max-width:100%;max-height:260px;border-radius:6px}
.upload-zone .hint{color:#999;font-size:0.85em;text-align:center;padding:20px}
.upload-zone .hint span{font-size:2.8em;display:block;margin-bottom:6px}
.btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.btn{padding:10px 18px;border:none;border-radius:7px;font-size:0.9em;font-weight:600;cursor:pointer;transition:0.15s;background:#fff;color:#1677ff;border:1.5px solid #1677ff}
.btn:active{background:#e6f0ff}
.btn-go{background:#1677ff;color:#fff;border:none}
.btn-go:active{background:#0958d9}
.btn:disabled{opacity:0.4;pointer-events:none}
.btn-nav{background:#1677ff;color:#fff;border:none;width:100%;margin-top:4px}
.bar{background:#eee;border-radius:6px;height:20px;overflow:hidden;margin:8px 0}
.bar-fill{height:100%;border-radius:6px;transition:width 0.4s}
.nav-tip{background:#fff7e6;border:1px solid #ffd591;border-radius:8px;padding:10px;margin-top:10px}
.nav-tip .lb{font-size:0.75em;color:#ad6800;font-weight:bold}
.route-box{background:#e6f7ff;border:1px solid #91d5ff;border-radius:8px;padding:10px;margin-top:10px}
.steps-list{max-height:300px;overflow-y:auto;font-size:0.85em;color:#555;line-height:1.8;margin-top:6px;padding-right:4px}
.btn-amap{display:inline-block;background:#fff;color:#1677ff;border:1.5px solid #1677ff;border-radius:7px;padding:6px 14px;font-size:0.85em;font-weight:600;text-decoration:none;cursor:pointer;margin-top:8px;transition:0.15s}
.btn-amap:hover{background:#e6f0ff}
.btn-amap:active{background:#b3d4ff}
.hidden{display:none!important}
input[type=text]{width:100%;padding:9px;border:1px solid #d9d9d9;border-radius:7px;font-size:0.9em;margin-bottom:6px;outline:none}
input[type=text]:focus{border-color:#1677ff}
.loading{text-align:center;padding:16px;color:#999}
.spinner{width:28px;height:28px;border:3px solid #eee;border-top-color:#1677ff;border-radius:50%;animation:spin 0.7s linear infinite;margin:8px auto}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:16px;color:#bbb;font-size:0.7em}
</style>
</head>
<body>

<div class="header">
  <h1>🚗 交通标志识别 + 导航</h1>
  <div id="st">⏳ 加载模型...</div>
</div>

<div class="container">

  <div class="card">
    <h3>📷 上传交通标志照片</h3>
    <div class="upload-zone" id="zone">
      <div class="hint" id="hint"><span>📸</span>点击此处拍照 / 选择图片</div>
      <img id="pv" class="hidden" alt="">
    </div>
    <input type="file" id="fi" accept="image/*" capture="environment" class="hidden">
    <div class="btn-row">
      <button class="btn" id="bt">📷 拍照</button>
      <button class="btn" id="bp">🖼 相册</button>
      <button class="btn btn-go" id="bg" disabled>🔍 开始识别</button>
    </div>
  </div>

  <div class="card hidden" id="rc">
    <h3>🏷️ 识别结果</h3>
    <div id="ri"></div>
  </div>

  <div class="card">
    <h3>🗺️ 路线导航</h3>
    <input type="text" id="fi2" placeholder="起点，如：杭州东站">
    <input type="text" id="ti" placeholder="目的地，如：西湖">
    <button class="btn btn-nav" id="bn">🚀 规划路线</button>
    <div id="nr"></div>
  </div>

</div>

<footer>PreActResNet + SE注意力 · 浏览器本地推理 · 数据不出设备</footer>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.all.min.js"></script>
<script>
(function(){
var AK='aecf4844678fa2a6c8c424b583ce806d';
var MP='model.onnx';
var MN=[0.3337,0.3064,0.3171];
var SD=[0.2672,0.2564,0.2629];

var SG={0:['限速20km/h','前方限速20，请减速','🚗'],1:['限速30km/h','前方限速30，请减速','🚗'],2:['限速50km/h','前方限速50','🚗'],3:['限速60km/h','前方限速60','🚗'],4:['限速70km/h','前方限速70','🚗'],5:['限速80km/h','前方限速80','🚗'],6:['解除80限速','限速80已解除','ℹ'],7:['限速100km/h','前方限速100','🚗'],8:['限速120km/h','前方限速120','🚗'],9:['禁止超车','禁止超车，请勿变道','🚫'],10:['大车禁超','禁止大型车超车','🚫'],11:['路口优先','路口有优先通行权','ℹ'],12:['优先道路','当前为优先道路','ℹ'],13:['减速让行','请减速让行','⚠'],14:['停车让行','请停车让行！','⚠'],15:['禁止通行','禁止通行，请绕行！','🚫'],16:['大车禁行','禁止大车通行','🚫'],17:['禁止驶入','禁止驶入，请绕行！','🚫'],18:['注意危险','危险路段，谨慎驾驶','⚠'],19:['左急弯','左急弯，请减速','⚠'],20:['右急弯','右急弯，请减速','⚠'],21:['连续弯道','连续弯道，请减速','⚠'],22:['路面不平','路面不平，请减速','⚠'],23:['路面湿滑','路面湿滑，请减速','⚠'],24:['右侧变窄','道路右侧变窄','⚠'],25:['道路施工','道路施工，请减速','⚠'],26:['信号灯','前方信号灯','⚠'],27:['注意行人','注意行人','⚠'],28:['注意儿童','学校区域，请减速','⚠'],29:['注意自行车','注意自行车','⚠'],30:['注意冰雪','冰雪路面，避免急刹','⚠'],31:['野生动物','注意野生动物','⚠'],32:['解除所有限制','所有限制已解除','ℹ'],33:['前方右转','路口请右转','⬆'],34:['前方左转','路口请左转','⬆'],35:['直行','路口请直行','⬆'],36:['直行或右转','可直行或右转','⬆'],37:['直行或左转','可直行或左转','⬆'],38:['靠右行驶','请靠右行驶','⬆'],39:['靠左行驶','请靠左行驶','⬆'],40:['环岛','请绕环岛行驶','⬆'],41:['解除禁超','禁止超车已解除','ℹ'],42:['大车禁超解除','大车禁止超车已解除','ℹ']};

var session=null;
var imgSrc=null;  // data URL of the loaded image

// DOM refs
var zone=document.getElementById('zone');
var hint=document.getElementById('hint');
var pv=document.getElementById('pv');
var fi=document.getElementById('fi');
var bt=document.getElementById('bt');
var bp=document.getElementById('bp');
var bg=document.getElementById('bg');
var rc=document.getElementById('rc');
var ri=document.getElementById('ri');
var fi2=document.getElementById('fi2');
var ti=document.getElementById('ti');
var bn=document.getElementById('bn');
var nr=document.getElementById('nr');
var st=document.getElementById('st');

// ========== IndexedDB cache ==========
function openCache(){
  return new Promise(function(ok){
    var r=indexedDB.open('sg2',1);
    r.onupgradeneeded=function(e){e.target.result.createObjectStore('m');};
    r.onsuccess=function(e){ok(e.target.result);};
    r.onerror=function(){ok(null);};
  });
}
function readCache(db){
  return new Promise(function(ok){
    var t=db.transaction('m','readonly');
    var r=t.objectStore('m').get('onnx');
    r.onsuccess=function(){ok(r.result);};
    r.onerror=function(){ok(null);};
  });
}
function writeCache(db,buf){
  var t=db.transaction('m','readwrite');
  t.objectStore('m').put(buf,'onnx');
}

// ========== Model loading ==========
async function loadModel(){
  try{
    ort.env.wasm.wasmPaths='https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/';

    var db=await openCache();
    var cached=db?await readCache(db):null;

    if(cached){
      st.textContent='⚡ 从缓存加载...';
      session=await ort.InferenceSession.create(cached,{executionProviders:['wasm'],graphOptimizationLevel:'all'});
      st.textContent='✅ 模型就绪（已缓存）';
      bg.disabled=false;
      return;
    }

    st.textContent='⬇ 正在下载模型(~18MB)...';
    var resp=await fetch(MP);
    var buf=await resp.arrayBuffer();
    var arr=new Uint8Array(buf);
    st.textContent='下载完成，正在初始化模型...';

    if(db) writeCache(db,arr);

    session=await ort.InferenceSession.create(arr,{executionProviders:['wasm'],graphOptimizationLevel:'all'});
    st.textContent='✅ 模型就绪（已缓存，下次秒开）';
    bg.disabled=false;

  }catch(e){
    st.textContent='❌ 模型加载失败，请刷新页面重试';
    console.error(e);
  }
}

// ========== Preprocessing ==========
function preprocess(dataUrl){
  return new Promise(function(ok){
    var img=new Image();
    img.onload=function(){
      var c=document.createElement('canvas');
      c.width=32;c.height=32;
      c.getContext('2d').drawImage(img,0,0,32,32);
      var px=c.getContext('2d').getImageData(0,0,32,32).data;
      var t=new Float32Array(3*1024);
      for(var i=0;i<1024;i++){
        t[i]=(px[i*4]/255-MN[0])/SD[0];
        t[1024+i]=(px[i*4+1]/255-MN[1])/SD[1];
        t[2048+i]=(px[i*4+2]/255-MN[2])/SD[2];
      }
      ok(new ort.Tensor('float32',t,[1,3,32,32]));
    };
    img.src=dataUrl;
  });
}

async function recognize(dataUrl){
  var inp=await preprocess(dataUrl);
  var out=await session.run({input:inp});
  var lp=out.output.data;
  var mv=-Infinity, mi=0;
  for(var i=0;i<43;i++){if(lp[i]>mv){mv=lp[i];mi=i;}}
  var se=0;for(var i=0;i<43;i++)se+=Math.exp(lp[i]-mv);
  return{cls:mi,conf:1/se};
}

// ========== Image loading ==========
function onImgLoaded(file){
  var reader=new FileReader();
  reader.onload=function(evt){
    var dataUrl=evt.target.result;
    // Preview
    pv.src=dataUrl;
    pv.classList.remove('hidden');
    hint.classList.add('hidden');
    // Store for recognition
    imgSrc=dataUrl;
    bg.disabled=false;
    bg.textContent='🔍 开始识别';
  };
  reader.readAsDataURL(file);
}

// ========== Events ==========
zone.addEventListener('click',function(){fi.click();});
bt.addEventListener('click',function(e){e.stopPropagation();fi.click();});
bp.addEventListener('click',function(e){e.stopPropagation();fi.click();});

fi.addEventListener('change',function(){
  if(fi.files&&fi.files[0]) onImgLoaded(fi.files[0]);
});

document.addEventListener('paste',function(e){
  var it=e.clipboardData.items;
  for(var i=0;i<it.length;i++){
    if(it[i].type.indexOf('image/')===0){onImgLoaded(it[i].getAsFile());break;}
  }
});

zone.addEventListener('dragover',function(e){e.preventDefault();});
zone.addEventListener('drop',function(e){
  e.preventDefault();
  if(e.dataTransfer.files&&e.dataTransfer.files[0]) onImgLoaded(e.dataTransfer.files[0]);
});

bg.addEventListener('click',async function(){
  if(!imgSrc){alert('请先上传一张交通标志图片');return;}
  if(!session){alert('模型还没加载完，请稍等片刻再试');return;}

  bg.disabled=true;
  bg.textContent='⏳ 识别中...';
  rc.classList.remove('hidden');
  ri.innerHTML='<div class="loading"><div class="spinner"></div>正在识别交通标志...</div>';

  try{
    var r=await recognize(imgSrc);
    var s=SG[r.cls];
    var c=r.conf>0.7?'#2ecc71':r.conf>0.4?'#f39c12':'#e74c3c';
    var pct=(r.conf*100).toFixed(0);
    ri.innerHTML=
      '<div style="text-align:center;font-size:2.5em">'+s[2]+'</div>'+
      '<div style="text-align:center;font-size:1.3em;font-weight:bold;margin:6px 0">'+s[0]+'</div>'+
      '<div style="text-align:center;font-size:0.8em;color:#888;margin-bottom:6px">Class '+r.cls+'</div>'+
      '<div class="bar"><div class="bar-fill" style="width:'+pct+'%;background:'+c+'"></div></div>'+
      '<div style="text-align:center;font-size:0.85em">置信度 <b>'+(r.conf*100).toFixed(1)+'%</b></div>'+
      '<div class="nav-tip"><div class="lb">🗺 导航建议</div><div style="margin-top:4px">'+s[1]+'</div></div>';
  }catch(e){
    ri.innerHTML='<div style="color:#e74c3c;text-align:center;padding:10px">❌ 识别失败: '+e.message+'</div>';
  }
  bg.disabled=false;
  bg.textContent='🔍 开始识别';
});

// ========== Amap ==========
bn.addEventListener('click',async function(){
  var from=fi2.value.trim(), to=ti.value.trim();
  if(!from||!to){alert('请输入起点和目的地');return;}

  nr.innerHTML='<div class="loading"><div class="spinner"></div>正在规划路线...</div>';
  try{
    // geocode
    var g1=await(await fetch('https://restapi.amap.com/v3/geocode/geo?key='+AK+'&address='+encodeURIComponent(from))).json();
    var g2=await(await fetch('https://restapi.amap.com/v3/geocode/geo?key='+AK+'&address='+encodeURIComponent(to))).json();
    if(g1.status!=='1'||parseInt(g1.count)===0) throw new Error('找不到起点');
    if(g2.status!=='1'||parseInt(g2.count)===0) throw new Error('找不到目的地');

    var l1=g1.geocodes[0].location.split(',');
    var l2=g2.geocodes[0].location.split(',');
    var o={lng:parseFloat(l1[0]),lat:parseFloat(l1[1])};
    var d={lng:parseFloat(l2[0]),lat:parseFloat(l2[1])};

    // route
    var data=await(await fetch('https://restapi.amap.com/v3/direction/driving?key='+AK+'&origin='+o.lng+','+o.lat+'&destination='+d.lng+','+d.lat+'&extensions=base')).json();
    if(data.status==='1'&&data.route.paths.length){
      var p=data.route.paths[0];
      var dist=(parseInt(p.distance)/1000).toFixed(1);
      var dur=Math.round(parseInt(p.duration)/60);
      var steps=p.steps.map(function(s,i){return (i+1)+'. '+s.instruction;});

      var amapUrl='https://uri.amap.com/navigation?from='+o.lng+','+o.lat+','+encodeURIComponent(from)+'&to='+d.lng+','+d.lat+','+encodeURIComponent(to)+'&mode=car&callnative=1';
      var stepsHtml=steps.map(function(s){return '<div>'+s+'</div>';}).join('');
      nr.innerHTML=
        '<div class="route-box">'+
        '<div style="font-weight:bold;color:#1677ff">🚗 '+from+' → '+to+'</div>'+
        '<div style="margin:4px 0">距离 <b>'+dist+' km</b> | 预计 <b>'+dur+' 分钟</b> | 共 <b>'+steps.length+'</b> 步</div>'+
        '<div class="steps-list">'+stepsHtml+'</div>'+
        '<a class="btn-amap" href="'+amapUrl+'" target="_blank" rel="noopener">🗺️ 在Amap中打开导航</a>'+
        '</div>';
    }else{
      nr.innerHTML='<div style="color:#e74c3c;padding:8px">路线规划失败: '+(data.info||'未知')+'</div>';
    }
  }catch(e){
    nr.innerHTML='<div style="color:#e74c3c;padding:8px">❌ '+e.message+'</div>';
  }
});

// Start
loadModel();

})();
</script>
</body>
</html>
